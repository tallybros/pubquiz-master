<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bot</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&family=DM+Serif+Display&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:        #f7f8fc;
  --surface:   #ffffff;
  --navy:      #1a2340;
  --navy2:     #2d3a5e;
  --accent:    #e8764a;
  --accent-bg: #fdf0ea;
  --text:      #1a2340;
  --muted:     #5a6480;
  --hint:      #9aa0b5;
  --border:    rgba(26,35,64,0.10);
  --user-bg:   #1a2340;
  --bot-bg:    #f0f2f8;
  --r:         18px;
}

html, body { height: 100%; }

body {
  font-family: 'DM Sans', system-ui, sans-serif;
  background: var(--bg);
  display: flex;
  justify-content: center;
  align-items: stretch;
  min-height: 100vh;
}

.app {
  width: 100%;
  max-width: 700px;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  background: var(--surface);
  box-shadow: 0 0 0 1px var(--border), 0 8px 40px rgba(26,35,64,0.08);
}

/* ── Header ── */
.header {
  padding: 18px 24px 16px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  gap: 14px;
  background: var(--surface);
  position: sticky;
  top: 0;
  z-index: 10;
  flex-shrink: 0;
}

.avatar-wrap { position: relative; flex-shrink: 0; }

.avatar-wrap img {
  width: 48px; height: 48px;
  border-radius: 50%;
  object-fit: cover;
  display: block;
  border: 2px solid var(--surface);
  box-shadow: 0 0 0 2.5px var(--accent);
}

.avatar-placeholder {
  width: 48px; height: 48px;
  border-radius: 50%;
  background: var(--accent-bg);
  display: flex; align-items: center; justify-content: center;
  font-size: 20px; color: var(--accent);
  font-weight: 500;
  border: 2px solid var(--surface);
  box-shadow: 0 0 0 2.5px var(--accent);
}

.online-dot {
  position: absolute; bottom: 1px; right: 1px;
  width: 11px; height: 11px;
  background: #3ec97e;
  border-radius: 50%;
  border: 2px solid var(--surface);
}

.header-text h1 {
  font-family: 'DM Serif Display', serif;
  font-size: 19px;
  font-weight: 400;
  color: var(--navy);
  line-height: 1.2;
}

.header-text p {
  font-size: 12px;
  color: var(--muted);
  margin-top: 2px;
  font-weight: 300;
  max-width: 400px;
}

.header-badge {
  margin-left: auto;
  background: var(--accent-bg);
  color: var(--accent);
  font-size: 11px;
  font-weight: 500;
  padding: 4px 10px;
  border-radius: 20px;
  border: 1px solid rgba(232,118,74,0.25);
  white-space: nowrap;
  flex-shrink: 0;
}

/* ── Messages ── */
.messages {
  flex: 1;
  overflow-y: auto;
  padding: 24px 20px 32px;
  display: flex;
  flex-direction: column;
  gap: 16px;
}

.msg {
  display: flex;
  gap: 8px;
  max-width: 85%;
  animation: fadeUp 0.18s ease both;
}

@keyframes fadeUp {
  from { opacity: 0; transform: translateY(6px); }
  to   { opacity: 1; transform: translateY(0); }
}

.msg.user {
  align-self: flex-end;
  flex-direction: row-reverse;
}

.msg.bot { align-self: flex-start; }

.msg-av {
  width: 28px; height: 28px;
  border-radius: 50%;
  flex-shrink: 0;
  margin-top: 2px;
  overflow: hidden;
}

.msg-av img { width: 100%; height: 100%; object-fit: cover; border-radius: 50%; }

.msg-av.you {
  background: var(--navy2);
  display: flex; align-items: center; justify-content: center;
  font-size: 10px; font-weight: 500;
  color: rgba(255,255,255,0.8);
  letter-spacing: 0.02em;
}

.bubble {
  padding: 11px 15px;
  border-radius: var(--r);
  font-size: 14.5px;
  line-height: 1.65;
}

.msg.bot .bubble {
  background: var(--bot-bg);
  color: var(--text);
  border-top-left-radius: 4px;
}

.msg.user .bubble {
  background: var(--user-bg);
  color: rgba(255,255,255,0.92);
  border-top-right-radius: 4px;
}

.bubble p { margin-bottom: 0.5em; }
.bubble p:last-child { margin-bottom: 0; }
.bubble ul, .bubble ol { margin: 0.3em 0 0.5em 1.3em; }
.bubble li { margin-bottom: 0.25em; }
.bubble strong { font-weight: 500; }
.bubble a { color: var(--accent); text-decoration: underline; text-underline-offset: 2px; }
.bubble a:hover { opacity: 0.8; }
.msg.bot .bubble strong { color: var(--navy); }
.msg.user .bubble strong { color: white; }

/* ── Typing ── */
.typing {
  display: flex;
  gap: 5px;
  padding: 13px 16px;
  background: var(--bot-bg);
  border-radius: var(--r);
  border-top-left-radius: 4px;
  align-items: center;
  width: fit-content;
}

.dot {
  width: 6px; height: 6px;
  background: var(--hint);
  border-radius: 50%;
  animation: blink 1.2s infinite ease-in-out;
}
.dot:nth-child(2) { animation-delay: 0.2s; }
.dot:nth-child(3) { animation-delay: 0.4s; }

@keyframes blink {
  0%, 80%, 100% { transform: scale(1); opacity: 0.4; }
  40%           { transform: scale(1.2); opacity: 1; }
}

/* ── Starters ── */
.starters {
  padding: 0 20px 14px;
  display: flex;
  flex-wrap: wrap;
  gap: 7px;
}

.starter {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 6px 14px;
  font-size: 13px;
  color: var(--muted);
  cursor: pointer;
  font-family: inherit;
  transition: background 0.12s, color 0.12s, border-color 0.12s;
}

.starter:hover {
  background: var(--accent-bg);
  border-color: rgba(232,118,74,0.3);
  color: var(--accent);
}

/* ── Input ── */
.input-wrap {
  padding: 12px 16px 16px;
  border-top: 1px solid var(--border);
  background: var(--surface);
  flex-shrink: 0;
}

.input-row {
  display: flex;
  gap: 8px;
  align-items: flex-end;
  background: #f0f2f8;
  border: 1px solid var(--border);
  border-radius: var(--r);
  padding: 9px 9px 9px 16px;
  transition: border-color 0.2s;
}

.input-row:focus-within { border-color: rgba(26,35,64,0.28); }

textarea {
  flex: 1;
  border: none;
  background: transparent;
  resize: none;
  font-family: inherit;
  font-size: 14px;
  color: var(--text);
  line-height: 1.5;
  outline: none;
  max-height: 120px;
  min-height: 22px;
  overflow-y: auto;
}

textarea::placeholder { color: var(--hint); }

.send {
  width: 34px; height: 34px;
  border-radius: 50%;
  background: var(--navy);
  border: none;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
  transition: background 0.15s, transform 0.1s;
}

.send:hover { background: var(--navy2); }
.send:active { transform: scale(0.95); }
.send:disabled { background: var(--border); cursor: default; }

.send svg { fill: white; width: 15px; height: 15px; }

.footer-note {
  text-align: center;
  font-size: 11px;
  color: var(--hint);
  margin-top: 7px;
}

/* ── Responsive ── */
@media (max-width: 520px) {
  .messages { padding: 16px 14px 28px; }
  .input-wrap { padding: 10px 12px 14px; }
  .header { padding: 14px 16px 12px; }
  .header-badge { display: none; }
  .starters { padding: 0 14px 12px; }
}
</style>
</head>
<body>

<div class="app">

  <div class="header">
    <div class="avatar-wrap" id="av-wrap">
      <div class="avatar-placeholder" id="av-placeholder">?</div>
      <span class="online-dot"></span>
    </div>
    <div class="header-text">
      <h1 id="bot-name">Loading…</h1>
      <p id="bot-tagline"></p>
    </div>
    <div class="header-badge">Powered by Claude</div>
  </div>

  <div class="messages" id="messages"></div>

  <div class="starters" id="starters"></div>

  <div class="input-wrap">
    <div class="input-row">
      <textarea
        id="input"
        placeholder="Type a message…"
        rows="1"
        onkeydown="onKey(event)"
        oninput="resize(this)"
      ></textarea>
      <button class="send" id="send-btn" onclick="send()" disabled>
        <svg viewBox="0 0 16 16"><path d="M14.5 8L1.5 2l2 5.5L1.5 13l13-5zm-9.8 0.9L3.4 5.2l7.4 2.8-7.4 2.8 1.3-2.1z"/></svg>
      </button>
    </div>
    <p class="footer-note" id="footer-note">Powered by AI</p>
  </div>

</div>

<script>
let history = [];
let busy    = false;
let botAvatar = '';

/* ── Config load ── */
async function loadConfig() {
  try {
    const cfg = await fetch('/api/config').then(r => r.json());

    if (cfg.name) {
      document.getElementById('bot-name').textContent = cfg.name;
      document.title = cfg.name;
    }
    if (cfg.credit) {
      document.getElementById('footer-note').textContent = cfg.credit;
    }

    if (cfg.tagline) {
      document.getElementById('bot-tagline').textContent = cfg.tagline;
    }

    if (cfg.avatar) {
      botAvatar = cfg.avatar;
      const wrap = document.getElementById('av-wrap');
      wrap.innerHTML = `<img src="${cfg.avatar}" alt="${cfg.name || 'Bot'}"><span class="online-dot"></span>`;
    } else {
      const initial = (cfg.name || 'B')[0].toUpperCase();
      document.getElementById('av-placeholder').textContent = initial;
    }

    if (cfg.starters && cfg.starters.length) {
      const container = document.getElementById('starters');
      cfg.starters.forEach(s => {
        const btn = document.createElement('button');
        btn.className = 'starter';
        btn.textContent = s;
        btn.onclick = () => { setInput(s); send(); };
        container.appendChild(btn);
      });
    }
  } catch(e) {
    document.getElementById('bot-name').textContent = 'Bot';
  }
}

/* ── Message rendering ── */
function md(text) {
  return text
    .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
    .replace(/\*(.*?)\*/g,     '<em>$1</em>')
    .replace(/\[([^\]]+)\]\((https?:\/\/[^)]+)\)/g, '<a href="$2" target="_blank" rel="noopener noreferrer">$1</a>')
    .replace(/(?<!["\'=(>])(https?:\/\/[^\s<]+)/g, '<a href="$1" target="_blank" rel="noopener noreferrer">$1</a>')
    .split('\n')
    .reduce((html, line) => {
      const t = line.trim();
      if (t.startsWith('- ') || t.startsWith('• '))
        return html + `<li>${t.slice(2)}</li>`;
      if (html.endsWith('</li>') && !t.startsWith('-') && !t.startsWith('•'))
        return html.replace(/<li>/, '<ul><li>').trimEnd() + '</ul>' + (t ? `<p>${t}</p>` : '');
      return html + (t ? `<p>${t}</p>` : '');
    }, '');
}

function botAvEl() {
  const d = document.createElement('div');
  d.className = 'msg-av';
  if (botAvatar) {
    d.innerHTML = `<img src="${botAvatar}" alt="bot">`;
  } else {
    d.innerHTML = `<img src="" alt="bot" style="display:none">`;
    d.style.background = '#e8e8ee';
  }
  return d;
}

function addMsg(role, text) {
  const msgs = document.getElementById('messages');
  const wrap = document.createElement('div');
  wrap.className = `msg ${role}`;

  const av = document.createElement('div');
  if (role === 'bot') {
    av.className = 'msg-av';
    if (botAvatar) av.innerHTML = `<img src="${botAvatar}" alt="bot">`;
    else { av.className = 'msg-av'; av.style.background = 'var(--bot-bg)'; }
  } else {
    av.className = 'msg-av you';
    av.textContent = 'You';
  }

  const bubble = document.createElement('div');
  bubble.className = 'bubble';
  bubble.innerHTML = role === 'bot'
    ? md(text)
    : `<p>${text.replace(/</g,'&lt;').replace(/>/g,'&gt;')}</p>`;

  wrap.appendChild(av);
  wrap.appendChild(bubble);
  msgs.appendChild(wrap);

  setTimeout(() => { wrap.scrollIntoView(true); }, 0);
  return wrap;
}

function showTyping() {
  const msgs = document.getElementById('messages');
  const wrap = document.createElement('div');
  wrap.className = 'msg bot';
  wrap.id = 'typing';

  const av = document.createElement('div');
  av.className = 'msg-av';
  if (botAvatar) av.innerHTML = `<img src="${botAvatar}" alt="bot">`;

  const t = document.createElement('div');
  t.className = 'typing';
  t.innerHTML = '<div class="dot"></div><div class="dot"></div><div class="dot"></div>';

  wrap.appendChild(av);
  wrap.appendChild(t);
  msgs.appendChild(wrap);
  setTimeout(() => { wrap.scrollIntoView(true); }, 0);
}

function removeTyping() {
  const t = document.getElementById('typing');
  if (t) t.remove();
}

/* ── API call ── */
async function callAPI(msg) {
  history.push({ role: 'user', content: msg });
  const res = await fetch('/api/chat', {
    method:  'POST',
    headers: { 'Content-Type': 'application/json' },
    body:    JSON.stringify({ messages: history }),
  });
  const raw = await res.text();
  let data;
  try { data = JSON.parse(raw); } catch(e) { throw new Error(`Server error: ${raw.slice(0, 200)}`); }
  if (!res.ok) throw new Error(data.error || `HTTP ${res.status}`);
  const reply = data.content[0].text;
  history.push({ role: 'assistant', content: reply });
  return reply;
}

/* ── Send ── */
async function send() {
  const el   = document.getElementById('input');
  const text = el.value.trim();
  if (!text || busy) return;

  document.getElementById('starters').style.display = 'none';

  el.value = '';
  el.style.height = 'auto';
  busy = true;
  document.getElementById('send-btn').disabled = true;

  addMsg('user', text);
  showTyping();

  try {
    const reply = await callAPI(text);
    removeTyping();
    addMsg('bot', reply);
  } catch(e) {
    removeTyping();
    addMsg('bot', 'Error: ' + e.message);
    history.pop();
  }

  busy = false;
  document.getElementById('send-btn').disabled = false;
  el.focus();
}

/* ── Helpers ── */
function setInput(text) {
  document.getElementById('input').value = text;
}

function resize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 120) + 'px';
}

function onKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    send();
  }
}

/* ── Boot ── */
(async () => {
  await loadConfig();
  document.getElementById('send-btn').disabled = false;

  showTyping();
  try {
    const greeting = await callAPI('Hello! Please greet me warmly, introduce yourself briefly, and ask what I\'d like to know.');
    removeTyping();
    addMsg('bot', greeting);
  } catch(e) {
    removeTyping();
    addMsg('bot', 'Hi! How can I help you today?');
  }
})();
</script>

</body>
</html>
